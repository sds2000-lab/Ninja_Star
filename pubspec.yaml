name: fluttermvvmtemplate
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State & architecture
  flutter_mobx: ^2.0.6
  mobx: ^2.2.0
  provider: ^6.0.4

  # Networking & storage
  vexana: ^5.0.3
  shared_preferences: ^2.2.2

  # Localization
  easy_localization: ^3.0.3

  # UI & animations
  flutter_svg: ^2.2.4
  lottie: ^3.3.2
  shimmer: ^3.0.0
  animations: ^2.0.0
  auto_size_text: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.0
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.2.5

  # Connectivity
  connectivity_plus: ^7.1.0

  # Utils
  kartal: ^4.2.0
  logger: ^2.0.2+1
  webview_flutter: ^4.4.2
  equatable: ^2.0.5

  # Local modules (если нужны)
  architecture_widgets:
    path: module/architecture_widgets
  all_of_template:
    path: module/all_of_template

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0
  mobx_codegen: ^2.4.0
  mockito: ^5.4.4
  very_good_analysis: ^10.2.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - asset/lang/
    - asset/image/
    - asset/lottie/
    - asset/svg/
    - asset/logo.png